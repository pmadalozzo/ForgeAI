# Configuração local do Supabase para desenvolvimento do ForgeAI
# Documentação: https://supabase.com/docs/guides/cli/config

[project]
id = "forgeai-local"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:1420"
additional_redirect_urls = ["http://localhost:1420"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"

[analytics]
enabled = false
